<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뱀 게임</title>
  <script type="module" crossorigin src="/assets/main-CEtcWWo7.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/main-BjE4Nnj6.css">
</head>
<body>
    <div class="container">
        <h1>뱀 게임</h1>
        <div class="game-info">
            <div class="score">점수: <span id="score">0</span></div>
            <div class="high-score">최고 점수: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>방향키로 뱀을 조종하세요!</p>
            <p>스페이스바: 게임 시작/일시정지</p>
        </div>
        <div class="api-settings">
            <h3>AI 혼잣말 설정</h3>
            <div class="api-key-section">
                <label for="apiKey">OpenAI API 키 (선택사항):</label>
                <input type="password" id="apiKey" placeholder="sk-proj-..." />
                <button id="saveApiKey">저장</button>
                <button id="testApiKey">테스트</button>
                <button id="clearApiKey">삭제</button>
            </div>
            <div class="api-status" id="apiStatus">
                <!-- 테스트 결과가 여기에 표시됩니다 -->
            </div>
            <div class="chatter-frequency">
                <label for="chatterFreq">혼잣말 빈도:</label>
                <input type="range" id="chatterFreq" min="0" max="100" value="30" />
                <span id="freqValue">30%</span>
            </div>
            <p class="api-info">
                API 키를 설정하면 AI가 더 다양한 혼잣말을 합니다. 
                <br>설정하지 않으면 기본 텍스트를 사용합니다.
            </p>
        </div>
        <div class="game-over" id="gameOver">
            <h2>게임 종료!</h2>
            <p>최종 점수: <span id="finalScore">0</span></p>
            <button onclick="game.restart()">다시 시작</button>
        </div>
    </div>

</body>
</html>
